services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: akp-postgres
    environment:
      POSTGRES_DB: ai_knowledge_platform
      POSTGRES_USER: knowledge_user
      POSTGRES_PASSWORD: knowledge_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U knowledge_user -d ai_knowledge_platform"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: akp-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: akp-celery-worker
    command: celery -A app.tasks.celery_app worker -l info -Q document_queue,embedding_queue,index_queue,maintenance_queue
    environment:
      - DATABASE_URL=postgresql://knowledge_user:knowledge_pass@postgres:5432/ai_knowledge_platform
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-change-me-to-a-random-secret-key}
      - UPLOAD_DIR=/app/uploads
      - BGE_M3_MODEL_PATH=${BGE_M3_MODEL_PATH:-BAAI/bge-m3}
      - LLM_BASE_URL=${LLM_BASE_URL:-https://api.openai.com/v1}
      - LLM_API_KEY=${LLM_API_KEY:-your-api-key-here}
      - LLM_MODEL_NAME=${LLM_MODEL_NAME:-gpt-3.5-turbo}
    volumes:
      - ./uploads:/app/uploads
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: akp-backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://knowledge_user:knowledge_pass@postgres:5432/ai_knowledge_platform
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-change-me-to-a-random-secret-key}
      - UPLOAD_DIR=/app/uploads
      - BGE_M3_MODEL_PATH=${BGE_M3_MODEL_PATH:-BAAI/bge-m3}
      - LLM_BASE_URL=${LLM_BASE_URL:-https://api.openai.com/v1}
      - LLM_API_KEY=${LLM_API_KEY:-your-api-key-here}
      - LLM_MODEL_NAME=${LLM_MODEL_NAME:-gpt-3.5-turbo}
      - CORS_ORIGINS=http://localhost:5173,http://localhost:3000
    volumes:
      - ./uploads:/app/uploads
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: akp-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000/api
    volumes:
      - ./frontend/src:/app/src
    depends_on:
      - backend

volumes:
  postgres_data:
